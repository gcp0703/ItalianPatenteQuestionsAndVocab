name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, production]
    timeout-minutes: 10
    env:
      PROD_DIR: /home/azureuser/quizpatenteb
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Pull source into production tree
        run: git -C "$PROD_DIR" pull --ff-only origin main

      - name: Sync freshly built dist into production tree
        run: |
          rsync -a --delete frontend/dist/ "$PROD_DIR/frontend/dist/"

      - name: Install Python deps in production venv
        run: |
          source "$PROD_DIR/.venv/bin/activate"
          pip install -e "$PROD_DIR" --quiet

      - name: Restart service and health-check
        run: |
          sudo systemctl restart quizpatenteb
          sleep 3
          if curl -sf http://127.0.0.1:8500/api/health > /dev/null; then
            echo "Health check PASSED"
          else
            echo "Health check FAILED"
            sudo journalctl -u quizpatenteb --no-pager -n 30
            exit 1
          fi
